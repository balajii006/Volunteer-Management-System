server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: vms-notification-service
  cloud:
    config:
      enabled: false
  datasource:
    url: ${NOTIFICATION_DB_URL:jdbc:mysql://mainline.proxy.rlwy.net:49676/railway}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:hAFSMpYViCCbzqulXYKnXdVzdWgVJWdV}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: false
    clean-disabled: false
    clean-on-validation-error: true
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  cache:
    type: simple
  task:
    execution:
      pool:
        core-size: 5
        max-size: 10
        queue-capacity: 100
        thread-name-prefix: notification-

eureka:
  client:
    service-url:
      defaultZone: https://eureka-service-production-dbce.up.railway.app/eureka/
    register-with-eureka: true
    fetch-registry: true

security:
  jwt:
    issuer: ${JWT_ISSUER:volunteer-user-service}
    secret: ${JWT_SECRET:}

resilience4j:
  circuitbreaker:
    instances:
      default:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
